	<body>
		<script type="module" src="../src/popup/popup.ts"></script>


		<label class="toggle">
			<input type="checkbox">
			<span class="slider"></span>
		</label>
	</body>

</html>

<!-- Thanks w3 schools, https://www.w3schools.com/howto/howto_css_switch.asp -->

<style>
	body {
		background: linear-gradient(45deg, #174a8c 0%, #1860be 100%);
		/* background: #242424; */
		display: flex;
		justify-content: center;
		align-items: center;
		flex-direction: column;
		width: 200;
	}

	h1 {
		color: white;
	}

	/* label {
	} */

	.toggle {
		position: relative;
		display: inline-block;
		width: 60px;
		height: 34px;
	}

	.toggle input { 
		opacity: 0;
		width: 0;
		height: 0;
	}

	.slider {
		position: absolute;
		cursor: pointer;
		top: 0;
		left: 0;
		right: 0;
		bottom: 0;
		background-color: #ccc;
		-webkit-transition: .4s;
		transition: .4s;
		border-radius: 34px;
	}

	.slider:before {
		position: absolute;
		content: "";
		height: 26px;
		width: 26px;
		left: 4px;
		bottom: 4px;
		background-color: white;
		-webkit-transition: .4s;
		transition: .4s;
		border-radius: 50%;
	}

	input:checked + .slider {
		background-color: #257ee6;
	}

	input:focus + .slider {
		box-shadow: 0 0 1px #257ee6;
	}

	input:checked + .slider:before {
	-webkit-transform: translateX(26px);
	-ms-transform: translateX(26px);
	transform: translateX(26px);
	}


</style>
